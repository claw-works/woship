services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: woship
      POSTGRES_PASSWORD: woship
      POSTGRES_DB: woship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woship"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: woship
      DB_PASSWORD: woship
      DB_NAME: woship
      DB_SSLMODE: disable
      JWT_SECRET: change-this-secret-in-production
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
